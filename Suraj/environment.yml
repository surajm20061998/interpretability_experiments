# Reproducible environment for the Qwen context-bloat notebook.
#
# Python 3.11 is a deliberate choice:
# - PyTorch 2.11.0 requires Python >=3.10.
# - Transformers 5.5.4 requires Python >=3.10 and PyTorch 2.4+.
# - NumPy 2.4.4 and pandas 3.0.2 both require Python >=3.11.
name: qwen-context-bloat
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      - accelerate==1.13.0
      - ipykernel==7.2.0
      - jupyterlab==4.5.6
      - matplotlib==3.10.8
      - numpy==2.4.4
      - pandas==3.0.2
      - PyYAML==6.0.3
      - safetensors==0.7.0
      - seaborn==0.13.2
      - torch==2.11.0
      - tqdm==4.67.3
      - transformers==5.5.4

